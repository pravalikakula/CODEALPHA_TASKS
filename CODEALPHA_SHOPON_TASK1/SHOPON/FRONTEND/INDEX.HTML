<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShopOn</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <nav class="navbar">

        <div class="logo">
            <i class="fa-solid fa-bag-shopping"></i>
            ShopOn
        </div>

        <ul class="menu">

            <li><a href="index.html">Home</a></li>

            <li><a href="product.html">Products</a></li>

            <li><a href="login.html">Login</a></li>

            <li><a href="register.html">Register</a></li>

        </ul>

        <div class="cart-box">

            <i class="fa-solid fa-cart-shopping"></i>

            Cart

        </div>

    </nav>

    <section class="hero">

        <div class="hero-content">

            <h1>Big Fashion Sale</h1>

            <p>

            </p>

            <a href="product.html">
                <button>

    </section>

    <section class="category">

        <div class="category-box">

            <img src="https://cdn.pixabay.com/photo/2016/11/19/18/06/feet-1840619_1280.jpg">

        </div>

        <div class="category-box">

            <img src="https://cdn.pixabay.com/photo/2016/03/27/19/31/fashion-1283863_1280.jpg">

            <h3>T-Shirts</h3>

        </div>

        <div class="category-box">

            <img src="https://cdn.pixabay.com/photo/2016/11/29/13/39/analog-watch-1869928_1280.jpg">

            <h3>Watches</h3>

        </div>

        <div class="category-box">

            <img src="https://cdn.pixabay.com/photo/2015/01/21/14/14/apple-606761_1280.jpg">

            <h3>Laptops</h3>

        </div>
