<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeNest - Social Platform</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:linear-gradient(135deg,#c2e9fb,#fbc2eb,#a18cd1);
min-height:100vh;
}

/* ================= HEADER ================= */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
position:sticky;
top:0;
z-index:1000;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo{
font-size:28px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
color:#6a11cb;
}

.logo i{
color:#ff4d6d;
font-size:26px;
}

.nav a{
text-decoration:none;
margin-left:10px;
padding:10px 18px;
border-radius:30px;
color:white;
font-weight:bold;
transition:0.3s;
}

.login{background:#6a11cb;}
.register{background:#ff4d6d;}

.nav a:hover{
transform:scale(1.08);
}

/* ================= LAYOUT ================= */
.container{
display:grid;
grid-template-columns:1fr 2fr 1fr;
gap:20px;
padding:20px;
}

/* ================= CARD ================= */
.card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
margin-bottom:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* ================= PROFILE ================= */
.profile{
text-align:center;
}

.profile img{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #ff4d6d;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.follow-btn{
margin-top:10px;
padding:10px 22px;
border:none;
border-radius:30px;
background:linear-gradient(to right,#6a11cb,#ff4d6d);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.follow-btn:hover{
transform:scale(1.05);
}

/* ================= STORIES ================= */
.stories{
display:flex;
gap:12px;
overflow-x:auto;
}

.story{
text-align:center;
min-width:85px;
}

.story img{
width:70px;
height:70px;
border-radius:50%;
border:3px solid #6a11cb;
transition:0.3s;
}

.story img:hover{
transform:scale(1.1);
}

/* ================= POST ================= */
.post{
background:white;
padding:15px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
animation:fade 0.4s ease-in;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.post img{
width:100%;
border-radius:15px;
margin-top:10px;
}

.post h3{
color:#333;
}

.post p{
color:#555;
margin-top:5px;
}

/* ================= BUTTONS ================= */
.actions button{
margin:5px;
padding:8px 15px;
border:none;
border-radius:25px;
cursor:pointer;
background:#f2f2f2;
font-weight:bold;
transition:0.3s;
}

.actions button:hover{
background:#6a11cb;
color:white;
transform:scale(1.05);
}

/* ================= TRENDING ================= */
.trending p{
margin:10px 0;
color:#6a11cb;
font-weight:bold;
}

/* ================= COMMENT ================= */
.comment-box{
display:flex;
gap:10px;
margin-top:10px;
}

.comment-box input{
flex:1;
padding:8px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
}

.comment-box button{
padding:8px 12px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* ================= SOCIAL ICONS ================= */
.social i{
margin:5px;
font-size:18px;
color:#6a11cb;
cursor:pointer;
transition:0.3s;
}

.social i:hover{
transform:scale(1.3);
color:#ff4d6d;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
.container{
grid-template-columns:1fr;
}
}

</style>
</head>


<body>
<!-- ================= HEADER ================= -->
<header>
	<div class="logo">
		<i class="fa-solid fa-bolt"></i> VibeNest
	</div>
	<div class="nav">
		<a class="login" href="LOGIN.HTML">Login</a>
		<a class="register" href="REGISTER.HTML">Register</a>
	</div>
</header>

<!-- ================= MAIN ================= -->
<div class="container">
	<!-- LEFT PROFILE -->
	<div class="card profile glass">
		<img src="https://randomuser.me/api/portraits/women/68.jpg" class="profile-img">
		<h2>Pravalika</h2>
		<p>UI/Frontend Developer ✨</p>
		<button class="follow-btn" onclick="follow(this)">Follow</button>
		<div class="social">
			<i class="fa-brands fa-instagram"></i>
			<i class="fa-brands fa-facebook"></i>
			<i class="fa-brands fa-twitter"></i>
		</div>
	</div>
	<!-- CENTER -->
	<div>
		<!-- STORIES -->
		<div class="card glass">
			<h3>Stories</h3>


			<div class="stories">
				<div class="story">
					<img src="https://randomuser.me/api/portraits/women/45.jpg">
					<p>Ananya</p>
				</div>
				<div class="story">
					<img src="https://randomuser.me/api/portraits/men/32.jpg">
					<p>Rahul</p>
				</div>
				<div class="story">
					<img src="https://randomuser.me/api/portraits/women/50.jpg">
					<p>Sneha</p>
				</div>
			</div>
		</div>
		<!-- POST -->
		<div class="card glass">
			<textarea id="postText" placeholder="Share your vibe..." class="post-textarea"></textarea>
			<br><br>
			<button onclick="addPost()" class="post-btn">Post 🚀</button>
		</div>
		<!-- FEED -->
		<div id="feed">
			<div class="post">
				<h3>Rahul</h3>
				<p>Building next-gen social UI 🔥</p>
				<img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c">
				<div class="actions">
					<button onclick="like(this)">Like ❤️</button>
					<button onclick="comment()">Comment 💬</button>
					<button onclick="share()">Share 🔁</button>
				</div>
			</div>
		</div>
	</div>
	<!-- RIGHT -->
	<div class="card trending glass">
		<h3>Trending 🔥</h3>
		<p>#VibeCoding</p>
		<p>#FrontendMagic</p>
		<p>#UIUXDesign</p>
		<p>#WebDevLife</p>
	</div>
</div>

<!-- ================= SCRIPT ================= -->
<script>

function follow(btn){
btn.innerText = btn.innerText==="Follow"?"Following":"Follow";
btn.style.background = btn.innerText==="Follow"?"#6a11cb":"green";
}

function like(btn){
btn.innerText = btn.innerText==="Like ❤️"?"Liked ❤️":"Like ❤️";
btn.style.color="red";
}

function comment(){
let c = prompt("Write comment:");
if(c) alert("Comment added: " + c);
}

function share(){
alert("Shared successfully 🚀");
}

function addPost(){

let text = document.getElementById("postText").value;
if(text===""){alert("Write something!");return;}

let post = document.createElement("div");
post.className="post";

post.innerHTML=`
<h3>Pravalika</h3>
<p>${text}</p>

<div class="actions">
<button onclick="like(this)">Like ❤️</button>
<button onclick="comment()">Comment 💬</button>
<button onclick="share()">Share 🔁</button>
</div>
`;

document.getElementById("feed").prepend(post);
document.getElementById("postText").value="";
}

</script>

</body>
</html>
