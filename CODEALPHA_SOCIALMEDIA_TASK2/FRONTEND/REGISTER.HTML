<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>
    <link rel="stylesheet" href="SYTLE.CSS">
</head>
<body>

    <div class="wrapper" style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:transparent;">
        <h1 style="margin-top:40px;">Create Your Account</h1>
        <div class="card glass" style="max-width:400px;width:100%;">
            <form>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" placeholder="Choose a username" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn-submit" style="margin-top:18px;">Register</button>
                <div class="footer-text" style="margin-top:18px;">
                    Already have an account? <a href="LOGIN.HTML" class="login-link">Login</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
