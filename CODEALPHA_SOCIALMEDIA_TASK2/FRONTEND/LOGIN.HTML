<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Your Account</title>
    <link rel="stylesheet" href="SYTLE.CSS">
</head>
<body>

    <div class="wrapper" style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:transparent;">
        <h1 style="margin-top:40px;">Login to Your Account</h1>
        <div class="card glass" style="max-width:400px;width:100%;">
            <form>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-submit" style="margin-top:18px;">Login</button>
                <div class="footer-text" style="margin-top:18px;">
                    Don't have an account? <a href="REGISTER.HTML" class="register-link">Register</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
