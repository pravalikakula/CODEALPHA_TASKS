<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskFlow</title>
    <link rel="stylesheet" href="STYLE.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .auth-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4f46e5;
            margin-bottom: 24px;
        }
        .auth-container h2 {
            margin-bottom: 8px;
            font-size: 1.5rem;
            color: #0f172a;
        }
        .auth-container p {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }
        .form-input-wrapper {
            position: relative;
            margin-bottom: 16px;
            text-align: left;
        }
        .form-input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .form-input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 42px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .form-input-wrapper input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .auth-btn:hover { background: #4338ca; }
        .switch-auth {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .switch-auth a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }
        .back-home {
            display: inline-block;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #94a3b8;
            text-decoration: none;
        }
        .back-home:hover { color: #64748b; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo"><i class="fa-solid fa-rocket"></i> TaskFlow</div>
        <h2>Welcome Back</h2>
        <p>Log in to access your dashboard workspace</p>
        
        <form onsubmit="alert('Logged in successfully!'); window.location.href='INDEX.html'; return false;">
            <div class="form-input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="form-input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <div class="switch-auth">
            Don't have an account? <a href="REGISTER.html">Register here</a>
        </div>
        <a href="INDEX.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Homepage</a>
    </div>

</body>
</html>
